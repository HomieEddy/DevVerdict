server:
  port: 8083

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://postgres-auth:5432/auth
    username: ${DB_USER:devverdict}
    password: ${DB_PASSWORD:devverdict}
    hikari:
      connection-timeout: 20000
      initialization-fail-timeout: 60000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  main:
    banner-mode: off

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-devverdict-jwt-secret-key-2026}
    expiration-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
