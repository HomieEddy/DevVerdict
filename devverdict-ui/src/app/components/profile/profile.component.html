<div class="profile-container">
  <mat-card *ngIf="user() as u">
    <mat-card-header>
      <mat-card-title>{{ u.username }}</mat-card-title>
      <mat-card-subtitle>{{ u.email }}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <p><strong>Role:</strong> {{ u.role }}</p>
    </mat-card-content>
  </mat-card>

  <h2>My Reviews</h2>

  <div *ngIf="reviewsResource() as reviewsRes">
    <mat-card *ngIf="reviewsRes.value() as reviews">
      <mat-list *ngIf="reviews.length > 0; else noReviews">
        <div *ngFor="let review of reviews; let last = last">
          <mat-list-item>
            <mat-icon matListIcon>star</mat-icon>
            <div matLine>
              <strong>Rating:</strong> {{ review.rating }}/5
            </div>
            <div matLine>{{ review.comment }}</div>
            <div matLine class="review-date">{{ review.createdAt | date:'medium' }}</div>
          </mat-list-item>
          <mat-divider *ngIf="!last"></mat-divider>
        </div>
      </mat-list>

      <ng-template #noReviews>
        <mat-card-content>
          <p>No reviews yet.</p>
        </mat-card-content>
      </ng-template>
    </mat-card>
  </div>
</div>
