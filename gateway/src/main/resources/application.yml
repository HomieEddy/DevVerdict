server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-devverdict-jwt-secret-key-2026}

spring:
  application:
    name: gateway
  redis:
    host: redis
    port: 6379
    timeout: 2000ms
  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 300
            redis-rate-limiter.burstCapacity: 500
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@ipKeyResolver}"
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Content-Type
              - Authorization
              - X-Requested-With
            allowCredentials: false
        add-to-simple-url-handler-mapping: true
      routes:
        - id: catalog-service
          uri: http://catalog-service:8081
          predicates:
            - Path=/api/catalog/**
        - id: review-service
          uri: http://review-service:8082
          predicates:
            - Path=/api/reviews/**
        - id: auth-service
          uri: http://auth-service:8083
          predicates:
            - Path=/api/auth/**,/api/users/**
      httpclient:
        connect-timeout: 2000
        response-timeout: 5s

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: when-authorized
