server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - OPTIONS
            allowedHeaders:
              - Content-Type
              - Authorization
              - X-Requested-With
            allowCredentials: false
        add-to-simple-url-handler-mapping: true
      default-filters:
        - name: Retry
          args:
            retries: 3
            statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,INTERNAL_SERVER_ERROR
            methods: GET,POST
      routes:
        - id: catalog-service
          uri: lb://catalog-service
          predicates:
            - Path=/api/catalog/**
        - id: review-service
          uri: lb://review-service
          predicates:
            - Path=/api/reviews/**
      httpclient:
        connect-timeout: 2000
        response-timeout: 5s
    loadbalancer:
      configurations: default
    discovery:
      client:
        simple:
          instances:
            catalog-service:
              - uri: http://catalog-service:8081
            review-service:
              - uri: http://review-service:8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: when-authorized
