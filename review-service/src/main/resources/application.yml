server:
  port: 8082

spring:
  application:
    name: review-service
  datasource:
    url: jdbc:postgresql://postgres-reviews:5432/reviews
    username: ${DB_USER:devverdict}
    password: ${DB_PASSWORD:devverdict}
    hikari:
      connection-timeout: 20000
      initialization-fail-timeout: 60000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true  # Dev-only: disable in production
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: kafka:9092
    producer:
      acks: all
      retries: 3
      enable-idempotence: true

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-devverdict-jwt-secret-key-2026}

  cache:
    type: redis
    redis:
      time-to-live: 60000
  redis:
    host: redis
    port: 6379
    timeout: 2000ms

logging:
  level:
    com.devverdict.review.security.JwtAuthenticationFilter: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
