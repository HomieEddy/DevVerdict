server:
  port: 8081

spring:
  application:
    name: catalog-service
  datasource:
    url: jdbc:postgresql://postgres-catalog:5432/catalog
    username: ${DB_USER:devverdict}
    password: ${DB_PASSWORD:devverdict}
    hikari:
      connection-timeout: 20000
      initialization-fail-timeout: 60000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true  # Dev-only: disable in production
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: catalog-rating-consumer
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.devverdict.catalog.dto
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.devverdict.catalog.dto.ReviewCreatedEvent

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
